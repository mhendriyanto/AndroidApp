<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapClean Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="prototype-page">
  <h1 class="gallery-title">SnapClean</h1>
  <main class="gallery" aria-label="SnapClean screen gallery">
    <section>
      <p class="device-label">Sign In</p>
      <div class="device-frame"><iframe class="device-screen" src="signin.html" title="SnapClean sign in screen"></iframe></div>
    </section>
    <section>
      <p class="device-label">Sign Up</p>
      <div class="device-frame"><iframe class="device-screen" src="signup.html" title="SnapClean sign up screen"></iframe></div>
    </section>
    <section>
      <p class="device-label">Forgot Password</p>
      <div class="device-frame"><iframe class="device-screen" src="forgot-password.html" title="SnapClean forgot password screen"></iframe></div>
    </section>
    <section>
      <p class="device-label">Forgot Username</p>
      <div class="device-frame"><iframe class="device-screen" src="forgot-username.html" title="SnapClean forgot username screen"></iframe></div>
    </section>
    <section>
      <p class="device-label">Home</p>
      <div class="device-frame"><iframe class="device-screen" src="home.html" title="SnapClean home screen"></iframe></div>
    </section>
    <section>
      <p class="device-label">Import</p>
      <div class="device-frame"><iframe class="device-screen" src="import.html" title="SnapClean import screen"></iframe></div>
    </section>
    <section>
      <p class="device-label">Timer Set</p>
      <div class="device-frame"><iframe class="device-screen" src="timer-set.html" title="SnapClean timer set screen"></iframe></div>
    </section>
    <section>
      <p class="device-label">Active</p>
      <div class="device-frame"><iframe class="device-screen" src="active.html" title="SnapClean active screenshots screen"></iframe></div>
    </section>
    <section>
      <p class="device-label">Expiring</p>
      <div class="device-frame"><iframe class="device-screen" src="expiring.html" title="SnapClean expiring screenshots screen"></iframe></div>
    </section>
    <section>
      <p class="device-label">Keep Forever</p>
      <div class="device-frame"><iframe class="device-screen" src="keep.html" title="SnapClean keep forever screen"></iframe></div>
    </section>
    <section>
      <p class="device-label">Profile</p>
      <div class="device-frame"><iframe class="device-screen" src="profile.html" title="SnapClean profile screen"></iframe></div>
    </section>
    <section>
      <p class="device-label">Edit Profile</p>
      <div class="device-frame"><iframe class="device-screen" src="edit-profile.html" title="SnapClean edit profile screen"></iframe></div>
    </section>
    <section>
      <p class="device-label">Settings</p>
      <div class="device-frame"><iframe class="device-screen" src="settings.html" title="SnapClean settings screen"></iframe></div>
    </section>
  </main>
</body>
</html>
