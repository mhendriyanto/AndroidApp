<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapClean Keep Forever</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="phone">
    <div class="status-bar"><span>9:41</span><div class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i></div></div>
    <section class="app-scroll">
      <header class="top-bar">
        <button class="icon-button" aria-label="Back"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="title-block flex-1"><p>Saved</p><h1>Keep forever</h1></div>
      </header>
      <article class="hero-clean">
        <div class="hero-clean-content">
          <span class="badge keep w-fit"><i class="fa-solid fa-infinity"></i> 6 saved</span>
          <h2>Your saved screenshots.</h2>
          <p>No timers. Review anytime.</p>
        </div>
        <div class="hero-shot-stack" aria-hidden="true">
          <div class="floating-shot back">
            <div class="mock-status"></div>
            <div class="mock-card"></div>
            <div class="mock-line"></div>
            <div class="mock-line short"></div>
            <div class="mock-chip"></div>
          </div>
          <div class="floating-shot front">
            <div class="mock-status"></div>
            <div class="mock-line"></div>
            <div class="mock-line short"></div>
            <div class="mock-card"></div>
            <div class="mock-chip"></div>
          </div>
        </div>
      </article>
      <div class="section-head"><h2>Saved shots</h2><span>Review</span></div>
      <div class="grid grid-cols-2 gap-3">
        <article class="screenshot-card"><img class="h-[165px] w-full object-cover" src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=400&q=80" alt="Analytics"><div class="screenshot-body"><span class="value text-[13px]">Launch metrics</span><br><span class="label">Kept forever</span></div></article>
        <article class="screenshot-card"><img class="h-[165px] w-full object-cover" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=400&q=80" alt="Travel"><div class="screenshot-body"><span class="value text-[13px]">Travel QR</span><br><span class="label">Trip folder</span></div></article>
        <article class="screenshot-card"><img class="h-[165px] w-full object-cover" src="https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=400&q=80" alt="Contract"><div class="screenshot-body"><span class="value text-[13px]">Contract note</span><br><span class="label">Work</span></div></article>
        <article class="screenshot-card"><img class="h-[165px] w-full object-cover" src="https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&w=400&q=80" alt="Message"><div class="screenshot-body"><span class="value text-[13px]">Important DM</span><br><span class="label">Personal</span></div></article>
      </div>
    </section>
    <nav class="tab-bar">
      <div class="tab"><i class="fa-solid fa-house"></i><span>Home</span></div>
      <div class="tab"><i class="fa-solid fa-plus"></i><span>Import</span></div>
      <div class="tab active"><i class="fa-solid fa-images"></i><span>Active</span></div>
      <div class="tab"><i class="fa-solid fa-hourglass-half"></i><span>Expire</span></div>
      <div class="tab"><i class="fa-solid fa-gear"></i><span>Settings</span></div>
      <div class="home-indicator"></div>
    </nav>
  </main>
</body>
</html>
