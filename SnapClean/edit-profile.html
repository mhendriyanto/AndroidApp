<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapClean Edit Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="phone">
    <div class="status-bar"><span>9:41</span><div class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i></div></div>
    <section class="app-scroll">
      <header class="top-bar">
        <button class="icon-button" aria-label="Back"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="title-block flex-1"><p>Account</p><h1>Edit profile</h1></div>
      </header>
      <article class="card text-center">
        <img class="w-[92px] h-[92px] rounded-[30px] object-cover mx-auto" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=300&q=80" alt="Maya Chen">
        <button class="secondary-button mt-4"><i class="fa-solid fa-camera"></i> Change photo</button>
      </article>
      <div class="section-head"><h2>Details</h2><span></span></div>
      <article class="card">
        <div class="field"><label>Name</label><span>Maya Chen</span></div>
        <div class="field mt-3"><label>Email</label><span>maya@example.com</span></div>
        <div class="field mt-3"><label>Username</label><span>maya.clean</span></div>
      </article>
      <button class="primary-button mt-5"><i class="fa-solid fa-check"></i> Save changes</button>
      <button class="secondary-button mt-3"><i class="fa-solid fa-xmark"></i> Cancel</button>
    </section>
    <nav class="tab-bar">
      <div class="tab"><i class="fa-solid fa-house"></i><span>Home</span></div>
      <div class="tab"><i class="fa-solid fa-plus"></i><span>Import</span></div>
      <div class="tab"><i class="fa-solid fa-images"></i><span>Active</span></div>
      <div class="tab"><i class="fa-solid fa-hourglass-half"></i><span>Expire</span></div>
      <div class="tab active"><i class="fa-solid fa-gear"></i><span>Settings</span></div>
      <div class="home-indicator"></div>
    </nav>
  </main>
</body>
</html>
