<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapClean Active</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="phone">
    <div class="status-bar"><span>9:41</span><div class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i></div></div>
    <section class="app-scroll">
      <header class="top-bar">
        <div class="title-block"><p>With timers</p><h1>Active</h1></div>
        <button class="icon-button" aria-label="Sort"><i class="fa-solid fa-arrow-down-wide-short"></i></button>
      </header>
      <div class="cleanup-bar"><span class="active">All</span><span>30m</span><span>1h</span><span>Forever</span></div>
      <div class="section-head"><h2>Timers</h2><span>7 active</span></div>
      <article class="shot-item"><div class="flex gap-3"><div class="mini-shot mini-mock receipt" aria-label="Order screenshot"><div class="mock-block"></div></div><div class="flex-1 min-w-0"><div class="row"><h3>Order confirmation</h3><span class="badge danger">8m</span></div><p>Deletes on next open.</p></div></div></article>
      <article class="shot-item"><div class="flex gap-3"><div class="mini-shot mini-mock chat" aria-label="Message screenshot"><div class="mock-block"></div></div><div class="flex-1 min-w-0"><div class="row"><h3>Message thread</h3><span class="badge warn">43m</span></div><p>Temporary reply note.</p></div></div></article>
      <article class="shot-item"><div class="flex gap-3"><div class="mini-shot mini-mock chart" aria-label="Analytics screenshot"><div class="mock-block"></div></div><div class="flex-1 min-w-0"><div class="row"><h3>Analytics chart</h3><span class="badge">Tomorrow</span></div><p>Review later.</p></div></div></article>
      <article class="shot-item"><div class="flex gap-3"><div class="mini-shot mini-mock travel" aria-label="Travel screenshot"><div class="mock-block"></div></div><div class="flex-1 min-w-0"><div class="row"><h3>Travel QR code</h3><span class="badge keep">Keep</span></div><p>Saved for trip.</p></div></div></article>
    </section>
    <nav class="tab-bar">
      <div class="tab"><i class="fa-solid fa-house"></i><span>Home</span></div>
      <div class="tab"><i class="fa-solid fa-plus"></i><span>Import</span></div>
      <div class="tab active"><i class="fa-solid fa-images"></i><span>Active</span></div>
      <div class="tab"><i class="fa-solid fa-hourglass-half"></i><span>Expire</span></div>
      <div class="tab"><i class="fa-solid fa-gear"></i><span>Settings</span></div>
      <div class="home-indicator"></div>
    </nav>
  </main>
</body>
</html>
