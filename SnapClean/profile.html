<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapClean Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="phone">
    <div class="status-bar"><span>9:41</span><div class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i></div></div>
    <section class="app-scroll">
      <header class="top-bar">
        <button class="icon-button" aria-label="Back"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="title-block flex-1"><p>Account</p><h1>Profile</h1></div>
      </header>

      <article class="card">
        <div class="flex items-center gap-4">
          <img class="w-[78px] h-[78px] rounded-[26px] object-cover" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=300&q=80" alt="Maya Chen">
          <div class="stack flex-1">
            <span class="value text-[20px]">Maya Chen</span>
            <span class="label">maya@example.com</span>
          </div>
        </div>
        <button class="secondary-button mt-4"><i class="fa-solid fa-pen"></i> Edit profile</button>
      </article>

      <div class="metric-grid">
        <div class="metric"><strong>92</strong><span>deleted</span></div>
        <div class="metric"><strong>1.8GB</strong><span>saved</span></div>
        <div class="metric"><strong>14</strong><span>kept</span></div>
      </div>

      <div class="section-head"><h2>Timer mix</h2><span>Usage</span></div>
      <article class="card">
        <div class="donut-chart">
          <div class="donut-center"><div><strong>76</strong><span>shots</span></div></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="flex items-center gap-2"><span class="legend-dot" style="background:#0891b2"></span><span class="label">30 min</span></div>
          <div class="flex items-center gap-2"><span class="legend-dot" style="background:#22c55e"></span><span class="label">1 hour</span></div>
          <div class="flex items-center gap-2"><span class="legend-dot" style="background:#f59e0b"></span><span class="label">Tomorrow</span></div>
          <div class="flex items-center gap-2"><span class="legend-dot" style="background:#e2e8f0"></span><span class="label">Keep</span></div>
        </div>
      </article>

      <div class="section-head"><h2>Account</h2><span>Edit</span></div>
      <article class="card">
        <div class="row"><div class="flex items-center gap-3"><div class="setting-icon"><i class="fa-solid fa-cloud"></i></div><div class="stack"><span class="value">iCloud sync</span><span class="label">On</span></div></div><i class="fa-solid fa-chevron-right text-slate-300"></i></div>
        <div class="row mt-5"><div class="flex items-center gap-3"><div class="setting-icon"><i class="fa-solid fa-shield-halved"></i></div><div class="stack"><span class="value">Privacy</span><span class="label">Imported shots only</span></div></div><i class="fa-solid fa-chevron-right text-slate-300"></i></div>
        <div class="row mt-5"><div class="flex items-center gap-3"><div class="setting-icon"><i class="fa-solid fa-arrow-right-from-bracket"></i></div><div class="stack"><span class="value">Sign out</span><span class="label">End this session</span></div></div><i class="fa-solid fa-chevron-right text-slate-300"></i></div>
      </article>
    </section>
    <nav class="tab-bar">
      <div class="tab"><i class="fa-solid fa-house"></i><span>Home</span></div>
      <div class="tab"><i class="fa-solid fa-plus"></i><span>Import</span></div>
      <div class="tab"><i class="fa-solid fa-images"></i><span>Active</span></div>
      <div class="tab"><i class="fa-solid fa-hourglass-half"></i><span>Expire</span></div>
      <div class="tab active"><i class="fa-solid fa-gear"></i><span>Settings</span></div>
      <div class="home-indicator"></div>
    </nav>
  </main>
</body>
</html>
