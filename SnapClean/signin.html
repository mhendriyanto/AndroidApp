<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapClean Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="phone">
    <div class="status-bar"><span>9:41</span><div class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i></div></div>
    <section class="app-scroll flex flex-col justify-center" style="height:calc(932px - 52px);">
      <div>
        <div class="flex items-center gap-3">
          <div class="w-28 h-28 rounded-[36px] bg-white text-cyan-600 grid place-items-center text-5xl shadow-lg shadow-cyan-100 border border-cyan-100"><i class="fa-solid fa-broom"></i></div>
          <div class="stack"><span class="value text-[40px] leading-none">SnapClean</span><span class="label text-[13px]">Screenshot cleanup</span></div>
        </div>
        <h1 class="screen-title mt-7 !text-[28px]">Welcome</h1>
        <p class="mt-3 mb-0 text-[15px] leading-6 text-slate-500 font-semibold">Sync timers and saved screenshots.</p>
      </div>
      <article class="card mt-8">
        <div class="field"><label>Username/Email</label><span>maya@example.com</span></div>
        <div class="field mt-3"><label>Password</label><span>••••••••••••</span></div>
        <button class="primary-button mt-5"><i class="fa-solid fa-lock"></i> Sign in</button>
        <div class="mt-4 flex justify-center gap-8">
          <span class="text-cyan-700 text-[13px] font-extrabold">Forgot password?</span>
          <span class="text-cyan-700 text-[13px] font-extrabold">Forgot username?</span>
        </div>
        <div class="mt-5 text-center text-[13px] font-extrabold text-slate-500">New here? <span class="text-cyan-700">Create account</span></div>
      </article>
    </section>
  </main>
</body>
</html>
