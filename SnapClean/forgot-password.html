<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapClean Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="phone">
    <div class="status-bar"><span>9:41</span><div class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i></div></div>
    <section class="app-scroll flex flex-col justify-center text-center" style="height:calc(932px - 52px);">
      <h1 class="screen-title">Reset password</h1>
      <p class="mt-3 mb-0 text-[15px] leading-6 text-slate-500 font-semibold">Enter your email. We’ll send a reset link.</p>
      <article class="card mt-8">
        <div class="field"><label>Email</label><span>maya@example.com</span></div>
        <button class="primary-button mt-5"><i class="fa-solid fa-paper-plane"></i> Send reset link</button>
        <div class="mt-5 text-cyan-700 text-[13px] font-extrabold">Back to sign in</div>
      </article>
    </section>
  </main>
</body>
</html>
