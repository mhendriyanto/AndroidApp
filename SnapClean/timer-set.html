<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapClean Timer Set</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="phone">
    <div class="status-bar"><span>9:41</span><div class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i></div></div>
    <section class="app-scroll">
      <header class="top-bar">
        <button class="icon-button" aria-label="Back"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="title-block flex-1"><p>Saved</p><h1>Timer set</h1></div>
      </header>

      <article class="hero-clean">
        <div class="hero-clean-content">
          <span class="badge keep w-fit"><i class="fa-solid fa-check"></i> Ready</span>
          <h2>Deletes in 30 minutes.</h2>
          <p>SnapClean will remove it when the timer expires.</p>
        </div>
        <div class="hero-shot-stack" aria-hidden="true">
          <div class="floating-shot back">
            <div class="mock-status"></div>
            <div class="mock-card"></div>
            <div class="mock-line"></div>
            <div class="mock-line short"></div>
            <div class="mock-chip"></div>
          </div>
          <div class="floating-shot front">
            <div class="mock-status"></div>
            <div class="mock-line"></div>
            <div class="mock-line short"></div>
            <div class="mock-card"></div>
            <div class="mock-chip"></div>
          </div>
        </div>
      </article>

      <div class="section-head"><h2>Saved screenshot</h2><span>30 min</span></div>
      <article class="shot-item">
        <div class="flex gap-3">
          <div class="mini-shot mini-mock receipt" aria-label="Order screenshot"><div class="mock-block"></div></div>
          <div class="flex-1 min-w-0">
            <div class="row"><h3>Order confirmation</h3><span class="badge">Active</span></div>
            <p>Timer started at 9:41 AM.</p>
            <div class="progress mt-3"><span style="width:100%"></span></div>
          </div>
        </div>
      </article>

      <button class="primary-button mt-5"><i class="fa-solid fa-images"></i> View active</button>
      <button class="secondary-button mt-3"><i class="fa-solid fa-plus"></i> Import another</button>
    </section>
    <nav class="tab-bar">
      <div class="tab"><i class="fa-solid fa-house"></i><span>Home</span></div>
      <div class="tab active"><i class="fa-solid fa-plus"></i><span>Import</span></div>
      <div class="tab"><i class="fa-solid fa-images"></i><span>Active</span></div>
      <div class="tab"><i class="fa-solid fa-hourglass-half"></i><span>Expire</span></div>
      <div class="tab"><i class="fa-solid fa-gear"></i><span>Settings</span></div>
      <div class="home-indicator"></div>
    </nav>
  </main>
</body>
</html>
